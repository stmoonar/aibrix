apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: service-management-xxy
  name: service-management-xxy
  namespace: aibrix-system
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: service-management-xxy
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: service-management-xxy
    spec:
      containers:
      - env:
        - name: TARGET_NAMESPACE
          value: default
        - name: CONFIG_FILE_PATH
          value: /app/service_manage/configs/4model_8gpu.yaml
        - name: PORT
          value: '8001'
        image: service-management:latest_xxy
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 8001
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 1
        name: service-management-xxy
        ports:
        - containerPort: 8001
          name: http-8001
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 8001
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      nodeName: nscc-ds-4a100-node10
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: service-management-sa
      serviceAccountName: service-management-sa
      terminationGracePeriodSeconds: 30
