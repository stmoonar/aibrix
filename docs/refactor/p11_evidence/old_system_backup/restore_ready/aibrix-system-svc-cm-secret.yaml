      \  \"gnetId\": null,\n  \"graphTooltip\": 0,\n  \"id\": null,\n  \"links\":\
      \ [],\n  \"panels\": [\n    {\n      \"datasource\": \"prometheus\",\n     \
      \ \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n    \
      \        \"mode\": \"palette-classic\"\n          },\n          \"unit\": \"\
      reqps\"\n        }\n      },\n      \"gridPos\": {\n        \"h\": 8,\n    \
      \    \"w\": 12,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"id\"\
      : 1,\n      \"targets\": [\n        {\n          \"expr\": \"aibrix_visualization_rps\"\
      ,\n          \"legendFormat\": \"{{model_name}} RPS\",\n          \"refId\"\
      : \"A\"\n        }\n      ],\n      \"title\": \"trace visualization: Request\
      \ Rate (RPS) by Model\",\n      \"type\": \"timeseries\"\n    },\n    {\n  \
      \    \"datasource\": \"prometheus\",\n      \"fieldConfig\": {\n        \"defaults\"\
      : {\n          \"color\": {\n            \"mode\": \"palette-classic\"\n   \
      \       },\n          \"unit\": \"short\"\n        }\n      },\n      \"gridPos\"\
      : {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\"\
      : 0\n      },\n      \"id\": 2,\n      \"targets\": [\n        {\n         \
      \ \"expr\": \"aibrix_visualization_pod_count\",\n          \"legendFormat\"\
      : \"{{model_name}} Pod Count\",\n          \"refId\": \"A\"\n        }\n   \
      \   ],\n      \"title\": \"trace visualization: Pod Count by Model\",\n    \
      \  \"type\": \"timeseries\"\n    },\n    {\n      \"datasource\": \"prometheus\"\
      ,\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n\
      \            \"mode\": \"palette-classic\"\n          },\n          \"unit\"\
      : \"tps\"\n        }\n      },\n      \"gridPos\": {\n        \"h\": 8,\n  \
      \      \"w\": 24,\n        \"x\": 0,\n        \"y\": 8\n      },\n      \"id\"\
      : 3,\n      \"targets\": [\n        {\n          \"expr\": \"aibrix_visualization_input_tokens_per_second\"\
      ,\n          \"legendFormat\": \"{{model_name}} Input Tokens/s\",\n        \
      \  \"refId\": \"A\"\n        },\n        {\n          \"expr\": \"aibrix_visualization_output_tokens_per_second\"\
      ,\n          \"legendFormat\": \"{{model_name}} Output Tokens/s\",\n       \
      \   \"refId\": \"B\"\n        }\n      ],\n      \"title\": \"trace visualization:\
      \ Token Throughput by Model\",\n      \"type\": \"timeseries\"\n    },\n   \
      \ {\n      \"datasource\": \"prometheus\",\n      \"fieldConfig\": {\n     \
      \   \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\
      \n          },\n          \"custom\": {\n            \"align\": \"auto\",\n\
      \            \"displayMode\": \"auto\"\n          },\n          \"mappings\"\
      : [],\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n  \
      \          \"steps\": [\n              {\n                \"color\": \"green\"\
      ,\n                \"value\": null\n              },\n              {\n    \
      \            \"color\": \"red\",\n                \"value\": 80\n          \
      \    }\n            ]\n          }\n        },\n        \"overrides\": [\n \
      \         {\n            \"matcher\": {\n              \"id\": \"byName\",\n\
      \              \"options\": \"Model\"\n            },\n            \"properties\"\
      : [\n              {\n                \"id\": \"custom.width\",\n          \
      \      \"value\": 200\n              }\n            ]\n          },\n      \
      \    {\n            \"matcher\": {\n              \"id\": \"byName\",\n    \
      \          \"options\": \"RPS\"\n            },\n            \"properties\"\
      : [\n              {\n                \"id\": \"unit\",\n                \"\
      value\": \"reqps\"\n              }\n            ]\n          },\n         \
      \ {\n            \"matcher\": {\n              \"id\": \"byName\",\n       \
      \       \"options\": \"Input TPS\"\n            },\n            \"properties\"\
      : [\n              {\n                \"id\": \"unit\",\n                \"\
      value\": \"tps\"\n              }\n            ]\n          },\n          {\n\
      \            \"matcher\": {\n              \"id\": \"byName\",\n           \
      \   \"options\": \"Output TPS\"\n            },\n            \"properties\"\
      : [\n              {\n                \"id\": \"unit\",\n                \"\
      value\": \"tps\"\n              }\n            ]\n          }\n        ]\n \
      \     },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 24,\n    \
      \    \"x\": 0,\n        \"y\": 16\n      },\n      \"id\": 4,\n      \"options\"\
      : {\n        \"showHeader\": true,\n        \"sortBy\": [\n          {\n   \
