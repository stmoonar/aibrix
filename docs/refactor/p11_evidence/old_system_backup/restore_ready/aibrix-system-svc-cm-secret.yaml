      : \"aibrix_visualization_input_tokens_per_second\",\n          \"format\": \"\
      table\",\n          \"instant\": true,\n          \"legendFormat\": \"\",\n\
      \          \"refId\": \"B\"\n        },\n        {\n          \"expr\": \"aibrix_visualization_output_tokens_per_second\"\
