apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dsqwen-7b-router
  namespace: aibrix-system
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: aibrix-eg
    namespace: aibrix-system
  rules:
  - backendRefs:
    - group: ''
      kind: Service
      name: dsqwen-7b
      namespace: default
      port: 8000
      weight: 1
    matches:
    - headers:
      - name: model
        type: Exact
        value: dsqwen-7b
      path:
        type: PathPrefix
        value: /v1/completions
    - headers:
      - name: model
        type: Exact
        value: dsqwen-7b
      path:
        type: PathPrefix
        value: /v1/chat/completions
    - headers:
      - name: model
        type: Exact
        value: dsqwen-7b
      path:
        type: PathPrefix
        value: /v1/embeddings
    - headers:
      - name: model
        type: Exact
        value: dsqwen-7b
      path:
        type: PathPrefix
        value: /generate
    - headers:
      - name: model
        type: Exact
        value: dsqwen-7b
      path:
        type: PathPrefix
        value: /generatevideo
    timeouts:
      request: 600s
