apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dsllama-8b-router
  namespace: tre-v2
  labels:
    model.aibrix.ai/name: dsllama-8b
    tre.aibrix.io/managed: 'true'
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: tre-aibrix-eg
    namespace: tre-v2
  rules:
  - backendRefs:
    - group: ''
      kind: Service
      name: dsllama-8b
      namespace: default
      port: 8000
      weight: 1
    matches:
    - headers:
      - name: model
        type: Exact
        value: dsllama-8b
      path:
        type: PathPrefix
        value: /v1/completions
    - headers:
      - name: model
        type: Exact
        value: dsllama-8b
      path:
        type: PathPrefix
        value: /v1/chat/completions
    - headers:
      - name: model
        type: Exact
        value: dsllama-8b
      path:
        type: PathPrefix
        value: /v1/embeddings
    - headers:
      - name: model
        type: Exact
        value: dsllama-8b
      path:
        type: PathPrefix
        value: /generate
    - headers:
      - name: model
        type: Exact
        value: dsllama-8b
      path:
        type: PathPrefix
        value: /generatevideo
    timeouts:
      request: 600s
