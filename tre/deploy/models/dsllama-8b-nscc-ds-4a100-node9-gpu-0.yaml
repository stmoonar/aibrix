apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsllama-8b-nscc-ds-4a100-node9-gpu-0
  namespace: default
  labels:
    model.aibrix.ai/name: dsllama-8b
    model.aibrix.ai/port: '8000'
    tre.aibrix.io/managed: 'true'
    tre.aibrix.io/node: nscc-ds-4a100-node9
    tre.aibrix.io/gpu-ids: '0'
    tre.aibrix.io/routable: 'true'
  annotations: &id001
    tre.aibrix.io/gpu-ids: '0'
    tre.aibrix.io/gpu-uuids: GPU-689a3e93-68db-0dac-160b-6a791cf246e8
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dsllama-8b-nscc-ds-4a100-node9-gpu-0
  template:
    metadata:
      labels:
        model.aibrix.ai/name: dsllama-8b
        model.aibrix.ai/port: '8000'
        tre.aibrix.io/managed: 'true'
        tre.aibrix.io/node: nscc-ds-4a100-node9
        tre.aibrix.io/gpu-ids: '0'
        tre.aibrix.io/routable: 'true'
        app: dsllama-8b-nscc-ds-4a100-node9-gpu-0
      annotations: *id001
    spec:
      nodeName: nscc-ds-4a100-node9
      volumes:
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 20Gi
      - name: models-volume
        hostPath:
          path: /data
      containers:
      - name: vllm-openai
        image: vllm/vllm-openai:0.10.1-sleep
        imagePullPolicy: IfNotPresent
        command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
        - --host
        - 0.0.0.0
        - --port
        - '8000'
        - --uvicorn-log-level
        - warning
        - --model
        - /data/nfs_shared_data/DeepSeek-R1-Distill-Llama-8B
        - --served-model-name
        - dsllama-8b
        - --enable_sleep_mode
        - --no-enable-prefix-caching
        - --enable-chunked-prefill
        - --max-num-batched-tokens
        - '2048'
        - --swap-space
        - '20'
        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: GPU-689a3e93-68db-0dac-160b-6a791cf246e8
        - name: CUDA_VISIBLE_DEVICES
          value: '0'
        - name: VLLM_SERVER_DEV_MODE
          value: '1'
        - name: VLLM_WORKER_MULTIPROC_METHOD
          value: spawn
        - name: VLLM_USE_MODELSCOPE
          value: 'True'
        ports:
        - containerPort: 8000
          protocol: TCP
        resources: {}
        volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: models-volume
          mountPath: /data
