apiVersion: apps/v1
kind: Deployment
metadata:
  name: tre-v2-service-manager
  namespace: tre-v2
  labels:
    app.kubernetes.io/name: tre-v2-service-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tre-v2-service-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tre-v2-service-manager
    spec:
      serviceAccountName: tre-v2-service-manager
      nodeSelector:
        kubernetes.io/hostname: nscc-ds-4a100-node10
      containers:
        - name: service-manager
          image: tre-v2-service-manager:20260710-ca61e485
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: TRE_REDIS_URL
              value: redis://tre-v2-redis:6379/0
            - name: TRE_REGISTRY_PATH
              value: /app/tre/deploy/registry.yaml
            # Model Deployments + their HTTPRoutes live in these namespaces.
            - name: TRE_MODEL_NAMESPACE
              value: default
            - name: TRE_ROUTE_NAMESPACE
              value: tre-v2
            - name: TRE_GATEWAY_NAME
              value: tre-aibrix-eg
            # --- D8/D10 GPU-truth governance thresholds (Plan B: SM reads
            # tre:gpu_truth:<node> from the same TRE Redis, written by the
            # gpu-truth DaemonSet). ---
            - name: TRE_CREATE_MAX_USED_MIB
              value: "2500"
            - name: TRE_SLEEP_LEAK_USED_MIB
              value: "8192"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: tre-v2-service-manager
  namespace: tre-v2
  labels:
    app.kubernetes.io/name: tre-v2-service-manager
spec:
  selector:
    app.kubernetes.io/name: tre-v2-service-manager
  ports:
    - name: http
      port: 8000
      targetPort: 8000
