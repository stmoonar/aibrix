apiVersion: apps/v1
kind: Deployment
metadata:
  name: tre-v2-controller
  namespace: tre-v2
  labels:
    app.kubernetes.io/name: tre-v2-controller
spec:
  replicas: 1
  # Singleton controller with no leader election: a RollingUpdate would run old+new
  # pods concurrently and both could actuate. Recreate guarantees at most one controller.
  strategy:
    type: Recreate
  progressDeadlineSeconds: 120
  selector:
    matchLabels:
      app.kubernetes.io/name: tre-v2-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tre-v2-controller
    spec:
      serviceAccountName: tre-v2-controller
      nodeSelector:
        kubernetes.io/hostname: nscc-ds-4a100-node10
      containers:
        - name: controller
          image: tre-v2-controller:20260708-86670100
          imagePullPolicy: IfNotPresent
          env:
            - name: TRE_REDIS_URL
              value: redis://tre-v2-redis:6379/0
            # zm metrics are scraped into tre-v2-redis by the isolated
            # tre-gateway-plugins (ADR-0008); keep v1 read schema.
            - name: TRE_METRICS_REDIS_URL
              value: redis://tre-v2-redis:6379/0
            - name: TRE_METRICS_SCHEMA
              value: v1
            - name: TRE_SERVICE_MANAGER_URL
              value: http://tre-v2-service-manager:8000
            # Per-model params load from the tre-v2-registry ConfigMap mounted below, so
            # the console can edit theta_m/tau_*/SLOs and restart-to-apply without an image
            # rebuild. The baked /app/tre/deploy/registry.yaml stays as an escape-hatch
            # fallback (flip this value back to it via `kubectl set env`).
            - name: TRE_REGISTRY_PATH
              value: /etc/tre/registry.yaml
            # --- Signal / percentile口径 (F2 + D2) ---
            - name: TRE_SIGNAL_SOURCE
              value: zm
            - name: TRE_PERCENTILE_MODE
              value: bucket_upper
            # --- F2 zm read-side fixes (baseline lookback / degrade / EMA hold) ---
            - name: TRE_HIST_BASELINE_LOOKBACK_MS
              value: "90000"
            # N1: short windows + low QPS can leave single-digit latency samples; below
            # this count a window's p95 is nulled (unavailable) rather than decided on.
            - name: TRE_MIN_LATENCY_SAMPLES
              value: "10"
            - name: TRE_INCOMPLETE_POLICY
              value: drop_model
            - name: TRE_PAPER_STALE_MAX_WINDOWS
              value: "3"
            # --- Loop cadence / windows (D2; S1.1/S1.2 signal-freshness) ---
            - name: TRE_MONITOR_INTERVAL_SECONDS
              value: "20"
            # S1.2: metrics refresh decoupled from monitor_interval, set to the fastest
            # decision loop (rescue 5s) so the shared snapshot is never staler than 5s.
            - name: TRE_METRICS_REFRESH_INTERVAL_SECONDS
              value: "5"
            - name: TRE_RESCUE_INTERVAL_SECONDS
              value: "5"
            - name: TRE_FAIRNESS_INTERVAL_SECONDS
              value: "10"
            # S1.1: sliding window (no 60-120s tumbling staleness).
            - name: TRE_METRICS_WINDOW_MODE
              value: "sliding"
            # S1.2: single shared window shortened 60s->30s (3x the 10s write period,
            # covers 3 histogram points). FROZEN 2026-07-08 (ADR-0012): S1.2 real-machine acceptance on the
            # isolated tre-v2 plane, n=12 step-load trials over 3 models; first-reflection lag
            # (onset->first non-null z_m) P50=11.0s P95=12.7s max=14.9s <= 35s target -> W
            # authoritative at 30000. Evidence: docs/refactor/p11_evidence/s1_shortwindow_20260708/.
            # This is the single window S1.4 / R3 theta_m refit must use.
            - name: TRE_METRICS_WINDOW_MS
              value: "30000"
            # G5/N1.3: SafeScale commit-gate SLOs pinned explicitly to match the
            # registry.yaml calibration SLOs (ttft 500 / tpot 75), overriding the
            # looser 1200/100 code defaults so the shrink safety gate cannot silently
            # drift wider than calibration.
            - name: SAFE_SCALE_TTFT_P95_SLO_MS
              value: "500"
            - name: SAFE_SCALE_TPOT_P95_SLO_MS
              value: "75"
            # --- Ablation switches (D4); production defaults ---
            - name: ENABLE_TRE_SCALING
              value: "true"
            - name: TRE_ABLATION_DISABLE_FAST_LOOP
              value: "false"
            - name: TRE_ABLATION_DISABLE_SAFESCALE
              value: "false"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: registry
              mountPath: /etc/tre
              readOnly: true
      volumes:
        # Non-optional: a missing/deleted ConfigMap blocks the new pod at ContainerCreating
        # rather than silently booting stale or absent config.
        - name: registry
          configMap:
            name: tre-v2-registry
