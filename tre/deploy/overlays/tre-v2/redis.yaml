apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: Service
    metadata:
      name: tre-v2-redis
      namespace: tre-v2
      labels:
        app.kubernetes.io/name: tre-v2-redis
    spec:
      selector:
        app.kubernetes.io/name: tre-v2-redis
      ports:
        - name: redis
          port: 6379
          targetPort: 6379
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: tre-v2-redis
      namespace: tre-v2
      labels:
        app.kubernetes.io/name: tre-v2-redis
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: tre-v2-redis
      template:
        metadata:
          labels:
            app.kubernetes.io/name: tre-v2-redis
        spec:
          containers:
            - name: redis
              image: redis:7.2-alpine
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 6379
                  name: redis
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
