apiVersion: apps/v1
kind: Deployment
metadata:
  name: tre-v2-ui
  namespace: tre-v2
  labels:
    app.kubernetes.io/name: tre-v2-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tre-v2-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tre-v2-ui
    spec:
      serviceAccountName: tre-v2-ui
      nodeSelector:
        kubernetes.io/hostname: nscc-ds-4a100-node10
      containers:
        - name: ui
          image: tre-v2-ui:20260706-b593243e
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: TRE_REDIS_URL
              value: redis://tre-v2-redis:6379/0
            - name: TRE_SERVICE_MANAGER_URL
              value: http://tre-v2-service-manager:8000
            - name: TRE_REGISTRY_PATH
              value: /app/tre/deploy/registry.yaml
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: tre-v2-ui
  namespace: tre-v2
  labels:
    app.kubernetes.io/name: tre-v2-ui
spec:
  # NodePort so the console is reachable directly at http://<node-ip>:30812 without a
  # port-forward (browsed by the researcher operating experiments). tre-v2 only; no base impact.
  type: NodePort
  selector:
    app.kubernetes.io/name: tre-v2-ui
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30812
