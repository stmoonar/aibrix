apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tre-v2-manager
  namespace: tre-v2
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tre-v2-manager
  namespace: tre-v2
subjects:
  - kind: ServiceAccount
    name: tre-v2-controller
    namespace: tre-v2
  - kind: ServiceAccount
    name: tre-v2-service-manager
    namespace: tre-v2
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tre-v2-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tre-v2-readonly
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tre-v2-readonly
subjects:
  - kind: ServiceAccount
    name: tre-v2-controller
    namespace: tre-v2
  - kind: ServiceAccount
    name: tre-v2-service-manager
    namespace: tre-v2
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tre-v2-readonly
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tre-v2-model-manager
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tre-v2-model-manager
  namespace: default
subjects:
  - kind: ServiceAccount
    name: tre-v2-service-manager
    namespace: tre-v2
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tre-v2-model-manager
