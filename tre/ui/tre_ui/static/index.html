<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TRE Console</title>
  <style>
    :root {
      --bg: #101214;
      --panel: #f4f1e8;
      --ink: #151515;
      --muted: #68665f;
      --line: #2b2e30;
      --awake: #18a058;
      --sleep: #b38b00;
      --hidden: #bd3f32;
      --accent: #00a8c8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--panel);
      font-family: "Aptos", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 24px 28px 14px;
      border-bottom: 1px solid var(--line);
    }
    h1 { margin: 0; font-size: 26px; font-weight: 700; }
    main {
      display: grid;
      grid-template-columns: minmax(320px, 1.1fr) minmax(320px, .9fr);
      gap: 16px;
      padding: 16px;
    }
    section {
      border: 1px solid var(--line);
      background: #171a1d;
      padding: 14px;
      min-width: 0;
    }
    h2 { margin: 0 0 12px; font-size: 15px; color: #c9c4b7; }
    .gpu-grid { display: grid; gap: 10px; }
    .node { display: grid; grid-template-columns: 82px repeat(4, minmax(54px, 1fr)); gap: 8px; align-items: center; }
    .gpu { aspect-ratio: 1 / .72; border: 1px solid #3b4044; display: grid; place-items: center; font-weight: 700; color: var(--ink); background: var(--panel); }
    .gpu.awake { background: var(--awake); }
    .gpu.sleeping { background: var(--sleep); }
    .gpu.hidden { background: var(--hidden); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #2d3033; padding: 8px; text-align: left; white-space: nowrap; }
    th { color: #bdb7a9; font-weight: 600; }
    pre { margin: 0; white-space: pre-wrap; color: #d8d2c3; font-size: 12px; }
    .span-2 { grid-column: 1 / -1; }
    @media (max-width: 820px) { main { grid-template-columns: 1fr; } .span-2 { grid-column: auto; } }
  </style>
</head>
<body>
  <header>
    <h1>TRE Console</h1>
    <div id="health">offline shell</div>
  </header>
  <main>
    <section>
      <h2>Cluster Grid</h2>
      <div id="cluster" class="gpu-grid"></div>
    </section>
    <section>
      <h2>Latest Decision</h2>
      <pre id="decision">loading</pre>
    </section>
    <section class="span-2">
      <h2>Model Parameters</h2>
      <div id="models"></div>
    </section>
    <section class="span-2">
      <h2>Experiment Panel</h2>
      <pre id="experiments">loading</pre>
    </section>
  </main>
  <script>
    async function getJson(path) {
      const response = await fetch(path);
      if (!response.ok) throw new Error(path + ' ' + response.status);
      return response.json();
    }
    function renderCluster(payload) {
      const bindings = new Map((payload.service_manager.bindings || []).map(b => [b.slot.node + ':' + b.slot.gpu_ids[0], b]));
      document.getElementById('cluster').innerHTML = payload.topology.nodes.map(node => {
        const cells = Array.from({length: node.gpus}, (_, idx) => {
          const binding = bindings.get(node.name + ':' + idx);
          const state = !binding ? '' : (binding.hidden ? 'hidden' : (binding.awake ? 'awake' : 'sleeping'));
          const label = binding ? binding.model : 'free';
          return '<div class="gpu ' + state + '">GPU ' + idx + '<br>' + label + '</div>';
        }).join('');
        return '<div class="node"><strong>' + node.name + '</strong>' + cells + '</div>';
      }).join('');
    }
    function renderModels(payload) {
      document.getElementById('models').innerHTML = '<table><thead><tr><th>Model</th><th>TP</th><th>Replicas</th><th>Theta</th><th>Lambda</th></tr></thead><tbody>' +
        payload.models.map(m => '<tr><td>' + m.name + '</td><td>' + m.tp_size + '</td><td>' + m.min_replicas + '-' + m.max_replicas + '</td><td>' + m.trs.theta_m + '</td><td>' + m.trs.lambda_wait + '</td></tr>').join('') +
        '</tbody></table>';
    }
    async function refresh() {
      const [cluster, models, decision, experiments] = await Promise.all([
        getJson('/api/cluster'), getJson('/api/models'), getJson('/api/decision/latest'), getJson('/api/experiments')
      ]);
      renderCluster(cluster);
      renderModels(models);
      document.getElementById('decision').textContent = JSON.stringify(decision, null, 2);
      document.getElementById('experiments').textContent = JSON.stringify(experiments, null, 2);
      document.getElementById('health').textContent = 'live';
    }
    refresh().catch(error => { document.getElementById('health').textContent = error.message; });
    setInterval(refresh, 5000);
  </script>
</body>
</html>
